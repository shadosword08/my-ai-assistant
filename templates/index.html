<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AI Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4ff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 800px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 90vh; }
    .header { background: #1a56db; color: white; padding: 20px; text-align: center; font-size: 22px; font-weight: bold; }
    #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .user-msg { background: #1a56db; color: white; padding: 12px 16px; border-radius: 18px 18px 4px 18px; align-self: flex-end; max-width: 70%; }
    .ai-msg { background: #f3f4f6; color: #111827; padding: 12px 16px; border-radius: 18px 18px 18px 4px; align-self: flex-start; max-width: 70%; white-space: pre-wrap; }
    .thinking { color: #9ca3af; font-style: italic; }
    .input-area { display: flex; padding: 16px; gap: 10px; border-top: 1px solid #e5e7eb; }
    #user-input { flex: 1; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 24px; font-size: 15px; outline: none; }
    #user-input:focus { border-color: #1a56db; }
    .send-btn { background: #1a56db; color: white; border: none; border-radius: 50%; width: 46px; height: 46px; cursor: pointer; font-size: 20px; }
    .send-btn:hover { background: #1d4ed8; }
    .reset-btn { background: #6b7280; color: white; border: none; border-radius: 24px; padding: 0 16px; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">🤖 My AI Assistant</div>
    <div id="chat-box">
      <div class="ai-msg">Hi! I am your AI assistant. Ask me anything!</div>
    </div>
    <div class="input-area">
      <input id="user-input" type="text" placeholder="Ask me anything..." />
      <button class="reset-btn" onclick="resetChat()">Reset</button>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
  <script>
    async function sendMessage() {
      const input = document.getElementById('user-input');
      const msg = input.value.trim();
      if (!msg) return;
      addMessage(msg, 'user-msg');
      input.value = '';
      const thinking = addMessage('Thinking...', 'ai-msg thinking');
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        thinking.remove();
        addMessage(data.response, 'ai-msg');
      } catch (err) {
        thinking.remove();
        addMessage('Something went wrong. Please try again.', 'ai-msg');
      }
    }
    function addMessage(text, cls) {
      const box = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
      return div;
    }
    async function resetChat() {
      await fetch('/reset', { method: 'POST' });
      document.getElementById('chat-box').innerHTML = '<div class="ai-msg">Chat reset! How can I help you?</div>';
    }
    document.getElementById('user-input').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
