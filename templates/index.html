<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AI Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4ff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 800px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; }
    .header { background: #1a56db; color: white; padding: 16px 20px; text-align: center; font-size: 20px; font-weight: bold; border-radius: 12px 12px 0 0; }
    .toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #f8faff; border-bottom: 1px solid #e5e7eb; }
    .toolbar label { background: #e0e7ff; color: #1a56db; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; }
    .toolbar input[type=file] { display: none; }
    #file-status { font-size: 13px; color: #6b7280; }
    #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .user-msg { background: #1a56db; color: white; padding: 12px 16px; border-radius: 18px 18px 4px 18px; align-self: flex-end; max-width: 75%; }
    .ai-msg { background: #f3f4f6; color: #111827; padding: 12px 16px; border-radius: 18px 18px 18px 4px; align-self: flex-start; max-width: 75%; white-space: pre-wrap; line-height: 1.5; }
    .thinking { color: #9ca3af; font-style: italic; }
    .input-area { display: flex; padding: 16px; gap: 10px; border-top: 1px solid #e5e7eb; }
    #user-input { flex: 1; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 24px; font-size: 15px; outline: none; }
    #user-input:focus { border-color: #1a56db; }
    .send-btn { background: #1a56db; color: white; border: none; border-radius: 50%; width: 46px; height: 46px; cursor: pointer; font-size: 20px; }
    .reset-btn { background: #6b7280; color: white; border: none; border-radius: 24px; padding: 0 16px; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">🤖 My AI Assistant</div>
    <div class="toolbar">
      <label for="file-input">📄 Upload Document</label>
      <input type="file" id="file-input" accept=".txt,.md,.csv,.py,.js,.html" onchange="uploadFile(this)">
      <span id="file-status">Upload a .txt or code file to ask questions about it</span>
    </div>
    <div id="chat-box">
      <div class="ai-msg">Hi! I can answer anything — I have web search and can read your documents. Ask me anything!</div>
    </div>
    <div class="input-area">
      <input id="user-input" type="text" placeholder="Ask me anything..." />
      <button class="reset-btn" onclick="resetChat()">Reset</button>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
  <script>
    async function sendMessage() {
      const input = document.getElementById('user-input');
      const msg = input.value.trim();
      if (!msg) return;
      addMessage(msg, 'user-msg');
      input.value = '';
      const thinking = addMessage('Thinking...', 'ai-msg thinking');
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        thinking.remove();
        addMessage(data.response, 'ai-msg');
      } catch (err) {
        thinking.remove();
        addMessage('Something went wrong. Please try again.', 'ai-msg');
      }
    }

    async function uploadFile(input) {
      const file = input.files[0];
      if (!file) return;
      document.getElementById('file-status').textContent = `Uploading ${file.name}...`;
      const formData = new FormData();
      formData.append('file', file);
      const thinking = addMessage(`Reading ${file.name}...`, 'ai-msg thinking');
      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        thinking.remove();
        addMessage(data.response, 'ai-msg');
        document.getElementById('file-status').textContent = `✅ ${file.name} loaded — ask questions about it!`;
      } catch (err) {
        thinking.remove();
        addMessage('Failed to upload file.', 'ai-msg');
      }
    }

    function addMessage(text, cls) {
      const box = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
      return div;
    }

    async function resetChat() {
      await fetch('/reset', { method: 'POST' });
      document.getElementById('chat-box').innerHTML = '<div class="ai-msg">Chat reset! How can I help?</div>';
      document.getElementById('file-status').textContent = 'Upload a .txt or code file to ask questions about it';
    }

    document.getElementById('user-input').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
