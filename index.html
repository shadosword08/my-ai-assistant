<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>My AI Assistant</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px;
           margin: 40px auto; padding: 20px; background: #f9fafb; }
    h1 { color: #1a56db; text-align: center; }
    #chat-box { background: white; border: 1px solid #e5e7eb;
                border-radius: 8px; padding: 20px; height: 400px;
                overflow-y: auto; margin-bottom: 16px; }
    .user-msg { background: #dbeafe; padding: 10px 14px;
                border-radius: 8px; margin: 8px 0; text-align: right; }
    .ai-msg { background: #f3f4f6; padding: 10px 14px;
              border-radius: 8px; margin: 8px 0; }
    #input-area { display: flex; gap: 8px; }
    #user-input { flex: 1; padding: 10px; border: 1px solid #d1d5db;
                  border-radius: 6px; font-size: 15px; }
    button { padding: 10px 20px; background: #1a56db; color: white;
             border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
    button:hover { background: #1d4ed8; }
    #reset-btn { background: #6b7280; }
  </style>
</head>
<body>
  <h1>🤖 My AI Assistant</h1>
  <div id='chat-box'></div>
  <div id='input-area'>
    <input id='user-input' type='text' placeholder='Ask me anything...' />
    <button onclick='sendMessage()'>Send</button>
    <button id='reset-btn' onclick='resetChat()'>Reset</button>
  </div>
  <script>
    async function sendMessage() {
      const input = document.getElementById('user-input');
      const msg = input.value.trim();
      if (!msg) return;
      addMessage('You', msg, 'user-msg');
      input.value = '';
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg})
      });
      const data = await res.json();
      addMessage('AI', data.response, 'ai-msg');
    }
    function addMessage(sender, text, cls) {
      const box = document.getElementById('chat-box');
      box.innerHTML += `<div class='${cls}'><b>${sender}:</b> ${text}</div>`;
      box.scrollTop = box.scrollHeight;
    }
    async function resetChat() {
      await fetch('/reset', {method: 'POST'});
      document.getElementById('chat-box').innerHTML = '';
    }
    document.getElementById('user-input').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
